<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>Space Snake — Six Seven Forty One</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #06060f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: monospace; color: #fff;
      overflow: hidden; touch-action: none;
    }
    #wrap { width: 100%; max-width: 420px; padding: 10px; }
    #backBtn {
      display: inline-block; padding: 6px 14px;
      background: transparent; border: 1px solid #2a2a5a;
      border-radius: 8px; color: #666; font-size: 12px;
      font-family: monospace; cursor: pointer;
      text-decoration: none; margin-bottom: 6px;
    }
    #backBtn:hover { color: #fff; border-color: #6a6aaa; }
    #hud {
      display: flex; justify-content: space-between;
      padding: 0 2px 6px; font-size: 14px; color: #666;
    }
    #hud span { color: #fff; font-weight: bold; }
    canvas {
      display: block; width: 100%;
      border-radius: 12px; border: 1px solid #1a1a4a;
      touch-action: none;
    }
    #hint { text-align: center; font-size: 11px; color: #333366; padding: 5px 0 6px; }
    #controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 6px; margin-top: 6px;
    }
    .ctrl-btn {
      padding: 12px 0; background: #0a0a22;
      border: 1px solid #2a2a5a; border-radius: 8px;
      color: #8888ff; font-size: 18px; text-align: center;
      cursor: pointer; touch-action: manipulation; user-select: none;
    }
    .ctrl-btn:active { background: #1a1a44; color: #fff; }
    #btnUp    { grid-column: 2; grid-row: 1; }
    #btnLeft  { grid-column: 1; grid-row: 2; }
    #btnDown  { grid-column: 2; grid-row: 2; }
    #btnRight { grid-column: 3; grid-row: 2; }
  </style>
</head>
<body>
<div id="wrap">
  <a href="index.html" id="backBtn">← Home</a>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
    <div>Length: <span id="length">3</span></div>
  </div>
  <canvas id="c"></canvas>
  <div id="hint">Eat 6, 7 and 41 to grow · Other numbers shrink you!</div>
  <div id="controls">
    <div class="ctrl-btn" id="btnUp">▲</div>
    <div class="ctrl-btn" id="btnLeft">◀</div>
    <div class="ctrl-btn" id="btnDown">▼</div>
    <div class="ctrl-btn" id="btnRight">▶</div>
  </div>
</div>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const lenEl   = document.getElementById('length');

// ── grid ──────────────────────────────────────────────────────
const COLS = 20, ROWS = 20, CELL = 21;
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;
const W = canvas.width, H = canvas.height;

// ── numbers ───────────────────────────────────────────────────
const TARGET_NUMS  = new Set([6, 7, 41]);
const POOL_TARGETS = [6, 7, 41];
const POOL_OTHERS  = [2, 3, 4, 5, 8, 9, 10, 12, 13, 15, 20, 22, 30, 42, 50];

// ── game state ────────────────────────────────────────────────
let state = 'idle';
let score = 0, best = 0;
let snake = [], dir = {x:1,y:0}, nextDir = {x:1,y:0};
let foods = [];
let tickTimer = null;
let drawFrame = 0;        // only incremented in draw loop
let flashTimer = 0, flashColor = '';
let popText = '', popTimer = 0;

// ── stars (generated once) ────────────────────────────────────
const stars = Array.from({length:40}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 0.5 + Math.random() * 1.2,
  a: 0.15 + Math.random() * 0.55,
  da: (Math.random() - 0.5) * 0.012,
}));

// ── helpers ───────────────────────────────────────────────────
function rnd(n) { return Math.floor(Math.random() * n); }

function cellOccupied(x, y) {
  return snake.some(s => s.x===x && s.y===y) ||
         foods.some(f => f.x===x && f.y===y);
}

const FOOD_LIFETIME = 300; // ticks before a wrong number fades away (~8s at 180ms)

function spawnFood(forceTarget = false) {
  const isTarget = forceTarget || Math.random() < 0.55;
  const pool = isTarget ? POOL_TARGETS : POOL_OTHERS;
  const num  = pool[rnd(pool.length)];
  let x, y, tries = 0;
  do { x = rnd(COLS); y = rnd(ROWS); tries++; } while (cellOccupied(x,y) && tries < 300);
  if (tries < 300) foods.push({
    x, y, num,
    isTarget: TARGET_NUMS.has(num),
    age: 0,       // counts up each gameTick
    alpha: 1,     // fades as age approaches FOOD_LIFETIME
  });
}

function ensureTargetOnBoard() {
  // if no target number is currently visible, force spawn one
  const hasTarget = foods.some(f => f.isTarget);
  if (!hasTarget) spawnFood(true);
}

// ── reset / start ─────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0;
  scoreEl.textContent = 0;

  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake   = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  foods   = [];
  lenEl.textContent = snake.length;

  for (let i = 0; i < 4; i++) spawnFood();
  ensureTargetOnBoard();

  clearInterval(tickTimer);
  tickTimer = setInterval(gameTick, 180);
}

// ── direction control ─────────────────────────────────────────
function tryDir(dx, dy) {
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  // block reversal
  if (dx === -dir.x && dy === -dir.y) return;
  nextDir = {x:dx, y:dy};
}

// buttons
document.getElementById('btnUp').addEventListener('pointerdown',    e=>{e.preventDefault();tryDir(0,-1);});
document.getElementById('btnDown').addEventListener('pointerdown',  e=>{e.preventDefault();tryDir(0, 1);});
document.getElementById('btnLeft').addEventListener('pointerdown',  e=>{e.preventDefault();tryDir(-1,0);});
document.getElementById('btnRight').addEventListener('pointerdown', e=>{e.preventDefault();tryDir(1, 0);});

// keyboard
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  switch(e.code) {
    case 'ArrowUp':    e.preventDefault(); tryDir(0,-1); break;
    case 'ArrowDown':  e.preventDefault(); tryDir(0, 1); break;
    case 'ArrowLeft':  e.preventDefault(); tryDir(-1,0); break;
    case 'ArrowRight': e.preventDefault(); tryDir(1, 0); break;
    case 'Space':      e.preventDefault(); if(state!=='playing') startGame(); break;
  }
});

// swipe
let swipeX=0, swipeY=0;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  swipeX=e.touches[0].clientX; swipeY=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(adx<12&&ady<12){ if(state!=='playing') startGame(); return; }
  if(adx>ady) tryDir(dx>0?1:-1, 0);
  else        tryDir(0, dy>0?1:-1);
},{passive:false});

// ── game tick (runs on setInterval, separate from draw) ───────
function gameTick() {
  if (state !== 'playing') return;

  dir = {x:nextDir.x, y:nextDir.y};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  // check if head landed on food
  const fi = foods.findIndex(f => f.x===head.x && f.y===head.y);
  if (fi !== -1) {
    const food = foods.splice(fi, 1)[0];

    if (food.isTarget) {
      // good number — grow (don't remove tail), score point
      score++;
      if (score > best) { best = score; bestEl.textContent = best; }
      scoreEl.textContent = score;
      flashColor = '#22ff88'; flashTimer = 12;
      popText = `+1  ${food.num}!`; popTimer = 50;
      // speed up every 5 points
      if (score % 5 === 0) {
        clearInterval(tickTimer);
        tickTimer = setInterval(gameTick, Math.max(80, 180 - score * 5));
      }
    } else {
      // wrong number — shrink by 2
      flashColor = '#ff3333'; flashTimer = 16;
      popText = `Not ${food.num}!`; popTimer = 50;
      if (snake.length <= 3) {
        endGame(); return;
      }
      snake.pop(); // remove tail (normal move)
      snake.pop(); // remove one extra (shrink penalty)
    }

    // always keep 4 food items on the board
    while (foods.length < 4) spawnFood();
    ensureTargetOnBoard();

  } else {
    // normal move — remove tail
    snake.pop();
  }

  // age non-target food — fade and expire after FOOD_LIFETIME ticks
  foods = foods.filter(f => {
    if (f.isTarget) return true; // targets never expire
    f.age++;
    f.alpha = Math.max(0, 1 - (f.age / FOOD_LIFETIME));
    return f.age < FOOD_LIFETIME;
  });

  // after expiring old food, refill and guarantee a target
  while (foods.length < 4) spawnFood();
  ensureTargetOnBoard();

  lenEl.textContent = snake.length;
}

function endGame() {
  state = 'dead';
  clearInterval(tickTimer);
  flashColor = '#ff3333'; flashTimer = 30;
}

// ── draw loop (runs on requestAnimationFrame, always) ─────────
function draw() {
  drawFrame++;

  // background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020208'); bg.addColorStop(1,'#080818');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // twinkling stars
  for (let s of stars) {
    s.a = Math.max(0.05, Math.min(0.8, s.a + s.da));
    if (s.a<=0.05||s.a>=0.8) s.da*=-1;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // grid
  ctx.strokeStyle = 'rgba(25,25,70,0.6)'; ctx.lineWidth = 0.5;
  for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

  // food — pulsing using drawFrame
  for (let f of foods) {
    const px = f.x*CELL + CELL/2;
    const py = f.y*CELL + CELL/2;
    const pulse = 0.5 + 0.5*Math.sin(drawFrame*0.06 + f.x*0.8 + f.y*0.5);
    const r = CELL * 0.42;

    // glow halo
    const halo = ctx.createRadialGradient(px,py,0,px,py,r*2.4);
    if (f.isTarget) {
      halo.addColorStop(0, `rgba(255,210,30,${pulse*0.35})`);
    } else {
      halo.addColorStop(0, `rgba(60,80,255,${pulse*0.28*f.alpha})`);
    }
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(px,py,r*2.4,0,Math.PI*2); ctx.fill();

    // orb body
    const bodyAlpha = f.isTarget ? 0.82+pulse*0.18 : (0.78+pulse*0.18) * f.alpha;
    ctx.fillStyle = f.isTarget
      ? `rgba(255,195,20,${bodyAlpha})`
      : `rgba(55,75,210,${bodyAlpha})`;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();

    // border
    ctx.strokeStyle = f.isTarget ? '#ffdd44' : `rgba(119,136,255,${f.alpha})`;
    ctx.lineWidth = 1.5; ctx.stroke();

    // number label
    ctx.globalAlpha = f.isTarget ? 1 : f.alpha;
    ctx.fillStyle   = f.isTarget ? '#1a0a00' : '#ffffff';
    ctx.font        = `bold ${f.num>=10?9:11}px monospace`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillText(f.num, px, py+0.5);
    ctx.globalAlpha = 1;
  }

  // snake body
  for (let i = snake.length-1; i >= 0; i--) {
    const s  = snake[i];
    const px = s.x*CELL, py = s.y*CELL;
    const pad = 1.5;
    const isHead = i === 0;

    if (isHead) {
      ctx.fillStyle = '#6688ff';
    } else {
      const t = i / snake.length;
      ctx.fillStyle = `rgb(${Math.round(38+(1-t)*50)},${Math.round(55+(1-t)*75)},${Math.round(175+(1-t)*65)})`;
    }

    ctx.beginPath();
    ctx.roundRect(px+pad, py+pad, CELL-pad*2, CELL-pad*2, isHead?5:3);
    ctx.fill();

    // head eyes
    if (isHead) {
      const cx2 = px+CELL/2, cy2 = py+CELL/2;
      const ex = dir.x, ey = dir.y;
      // perpendicular offset for two eyes
      const perpX = ey!==0 ? 4 : 0;
      const perpY = ex!==0 ? 4 : 0;
      const fwdX = ex*4, fwdY = ey*4;

      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx2+fwdX-perpX, cy2+fwdY-perpY, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2+fwdX+perpX, cy2+fwdY+perpY, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(cx2+fwdX-perpX+ex, cy2+fwdY-perpY+ey, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2+fwdX+perpX+ex, cy2+fwdY+perpY+ey, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // flash
  if (flashTimer > 0) {
    ctx.fillStyle   = flashColor;
    ctx.globalAlpha = (flashTimer/30)*0.28;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
    flashTimer--;
  }

  // pop text
  if (popTimer > 0) {
    ctx.globalAlpha = Math.min(1, popTimer/18);
    ctx.fillStyle   = popText.startsWith('+') ? '#22ff88' : '#ff6666';
    ctx.font        = 'bold 16px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText(popText, W/2, 18);
    ctx.globalAlpha = 1;
    popTimer--;
  }

  // idle screen
  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';       ctx.font = 'bold 24px monospace'; ctx.fillText('SPACE SNAKE', W/2, H/2-60);
    ctx.fillStyle = '#ffdd44';    ctx.font = '13px monospace';       ctx.fillText('Eat these to grow:', W/2, H/2-28);
    ctx.font = 'bold 18px monospace';                                ctx.fillText('6,  7,  and  41',  W/2, H/2-6);
    ctx.fillStyle = '#ff8888';    ctx.font = '12px monospace';       ctx.fillText('Other numbers shrink you!', W/2, H/2+18);
    ctx.fillStyle = '#555';       ctx.font = '12px monospace';       ctx.fillText('Tap an arrow to start', W/2, H/2+48);
  }

  // dead screen
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.68)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 26px monospace'; ctx.fillText('GAME OVER',  W/2, H/2-26);
    ctx.fillStyle = '#fff';    ctx.font = '15px monospace';       ctx.fillText(`Score: ${score}`, W/2, H/2+4);
    ctx.fillText(`Best:  ${best}`, W/2, H/2+24);
    ctx.fillStyle = '#555';    ctx.font = '12px monospace';       ctx.fillText('Tap an arrow to play again', W/2, H/2+54);
  }

  requestAnimationFrame(draw);
}

// ── kick off ──────────────────────────────────────────────────
draw();
</script>
</body>
</html>
